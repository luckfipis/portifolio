<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Lucas dos Santos Pereira — Desenvolvedor Front-end. Portfólio de projetos e habilidades." />
  <meta name="theme-color" content="#FAF6EE" />
  <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />

  <!-- Fraunces: serif expressiva com optical sizing — display e itálico -->
  <!-- Inter: corpo e UI, neutra e legível em qualquer tamanho -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet"
    media="print"
    onload="this.media='all'"
  />
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  </noscript>

  <!-- Evita flash de tema errado antes do React montar -->
  <script>
    (function() {
      var saved = localStorage.getItem('portfolio-theme');
      var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <title>Lucas Pereira · Dev Front-end</title>
</head>
<body>
  <div id="root"></div>
</body>
</html>
